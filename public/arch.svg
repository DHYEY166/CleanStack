<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="system-ui, -apple-system, sans-serif">
  <rect width="960" height="560" fill="#030712"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#f9fafb" font-size="18" font-weight="700">CleanStack — System Architecture</text>
  <text x="480" y="58" text-anchor="middle" fill="#6b7280" font-size="11">Vercel (Next.js 16) · AWS Aurora PostgreSQL · S3 · Lambda · SQS · SNS · Claude AI</text>

  <!-- ── LANE LABELS ── -->
  <text x="14" y="110" fill="#4b5563" font-size="10" font-weight="600" transform="rotate(-90,14,110)">USER</text>
  <text x="14" y="210" fill="#4b5563" font-size="10" font-weight="600" transform="rotate(-90,14,210)">VERCEL</text>
  <text x="14" y="330" fill="#4b5563" font-size="10" font-weight="600" transform="rotate(-90,14,330)">AWS</text>
  <text x="14" y="470" fill="#4b5563" font-size="10" font-weight="600" transform="rotate(-90,14,470)">AI</text>

  <!-- Lane backgrounds -->
  <rect x="28" y="78" width="920" height="64" fill="#111827" rx="6"/>
  <rect x="28" y="150" width="920" height="88" fill="#0f1729" rx="6"/>
  <rect x="28" y="246" width="920" height="200" fill="#111827" rx="6"/>
  <rect x="28" y="454" width="920" height="72" fill="#0f1729" rx="6"/>

  <!-- ═══════════════════════════════════════
       ROW 1 — USER ACTIONS
  ════════════════════════════════════════ -->

  <!-- User box -->
  <rect x="50" y="92" width="80" height="36" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="90" y="108" text-anchor="middle" fill="#d1d5db" font-size="10" font-weight="600">Browser</text>
  <text x="90" y="120" text-anchor="middle" fill="#9ca3af" font-size="9">User</text>

  <!-- Upload box -->
  <rect x="200" y="92" width="100" height="36" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="250" y="108" text-anchor="middle" fill="#d1d5db" font-size="10" font-weight="600">Upload File</text>
  <text x="250" y="120" text-anchor="middle" fill="#9ca3af" font-size="9">/pipelines/new</text>

  <!-- Data PR box -->
  <rect x="470" y="92" width="100" height="36" rx="8" fill="#1f2937" stroke="#6366f1" stroke-width="1.5"/>
  <text x="520" y="108" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Data PR Review</text>
  <text x="520" y="120" text-anchor="middle" fill="#818cf8" font-size="9">Approve / Reject</text>

  <!-- Run detail box -->
  <rect x="750" y="92" width="110" height="36" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1.5"/>
  <text x="805" y="108" text-anchor="middle" fill="#d1d5db" font-size="10" font-weight="600">Run Detail</text>
  <text x="805" y="120" text-anchor="middle" fill="#9ca3af" font-size="9">Quality + Drift view</text>

  <!-- arrows row 1 -->
  <line x1="130" y1="110" x2="196" y2="110" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="110" x2="466" y2="110" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="570" y1="110" x2="746" y2="110" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ═══════════════════════════════════════
       ROW 2 — VERCEL / NEXT.JS
  ════════════════════════════════════════ -->

  <!-- Next.js API -->
  <rect x="200" y="162" width="120" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="260" y="181" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="700">Next.js API</text>
  <text x="260" y="194" text-anchor="middle" fill="#60a5fa" font-size="8">/api/upload</text>
  <text x="260" y="206" text-anchor="middle" fill="#60a5fa" font-size="8">/api/suggest-transforms</text>
  <text x="260" y="218" text-anchor="middle" fill="#60a5fa" font-size="8">/api/approve-rules</text>

  <!-- Webhook -->
  <rect x="400" y="162" width="110" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="455" y="181" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="700">Webhooks</text>
  <text x="455" y="196" text-anchor="middle" fill="#60a5fa" font-size="8">/webhooks/profile-complete</text>
  <text x="455" y="210" text-anchor="middle" fill="#60a5fa" font-size="8">→ triggers AI route</text>

  <!-- arrows row 2 -->
  <line x1="250" y1="128" x2="250" y2="158" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>
  <line x1="320" y1="192" x2="396" y2="192" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrb)"/>

  <!-- ═══════════════════════════════════════
       ROW 3 — AWS
  ════════════════════════════════════════ -->

  <!-- S3 Raw -->
  <rect x="50" y="262" width="90" height="44" rx="8" fill="#1c2a1c" stroke="#16a34a" stroke-width="1.5"/>
  <text x="95" y="281" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">S3 Raw</text>
  <text x="95" y="294" text-anchor="middle" fill="#4ade80" font-size="8">cleanstack-raw-*</text>

  <!-- Lambda Profiler -->
  <rect x="200" y="258" width="110" height="52" rx="8" fill="#2a1f0f" stroke="#d97706" stroke-width="1.5"/>
  <text x="255" y="277" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">λ Profiler</text>
  <text x="255" y="290" text-anchor="middle" fill="#fbbf24" font-size="8">S3 PUT trigger</text>
  <text x="255" y="302" text-anchor="middle" fill="#fbbf24" font-size="8">profile + webhook</text>

  <!-- Aurora -->
  <rect x="380" y="258" width="100" height="52" rx="8" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="277" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Aurora PG</text>
  <text x="430" y="290" text-anchor="middle" fill="#a78bfa" font-size="8">pipelines · runs</text>
  <text x="430" y="302" text-anchor="middle" fill="#a78bfa" font-size="8">profiles · rules</text>

  <!-- SQS -->
  <rect x="560" y="258" width="90" height="52" rx="8" fill="#1c1c2a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="605" y="277" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">SQS</text>
  <text x="605" y="290" text-anchor="middle" fill="#818cf8" font-size="8">executor-queue</text>
  <text x="605" y="302" text-anchor="middle" fill="#818cf8" font-size="8">post-approval</text>

  <!-- Lambda Executor -->
  <rect x="720" y="258" width="110" height="52" rx="8" fill="#2a1f0f" stroke="#d97706" stroke-width="1.5"/>
  <text x="775" y="277" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">λ Executor</text>
  <text x="775" y="290" text-anchor="middle" fill="#fbbf24" font-size="8">SQS trigger</text>
  <text x="775" y="302" text-anchor="middle" fill="#fbbf24" font-size="8">transforms + drift</text>

  <!-- S3 Processed -->
  <rect x="855" y="262" width="90" height="44" rx="8" fill="#1c2a1c" stroke="#16a34a" stroke-width="1.5"/>
  <text x="900" y="281" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">S3 Processed</text>
  <text x="900" y="294" text-anchor="middle" fill="#4ade80" font-size="8">output.csv</text>

  <!-- SNS + Drift -->
  <rect x="720" y="326" width="110" height="100" rx="8" fill="#1c2a1c" stroke="#0d9488" stroke-width="1.5"/>
  <text x="775" y="345" text-anchor="middle" fill="#5eead4" font-size="10" font-weight="600">SNS + λ Drift</text>
  <text x="775" y="360" text-anchor="middle" fill="#2dd4bf" font-size="8">schema hash compare</text>
  <text x="775" y="374" text-anchor="middle" fill="#2dd4bf" font-size="8">→ Slack webhook</text>
  <text x="775" y="388" text-anchor="middle" fill="#2dd4bf" font-size="8">→ Email alert</text>
  <text x="775" y="402" text-anchor="middle" fill="#2dd4bf" font-size="8">SNS_DRIFT_TOPIC_ARN</text>

  <!-- AWS arrows -->
  <line x1="250" y1="222" x2="250" y2="258" stroke="#d97706" stroke-width="1.5" marker-end="url(#arro)"/>
  <!-- upload → S3 -->
  <line x1="260" y1="200" x2="120" y2="265" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrg)"/>
  <!-- S3 → Profiler -->
  <line x1="140" y1="284" x2="196" y2="284" stroke="#d97706" stroke-width="1.5" marker-end="url(#arro)"/>
  <!-- Profiler → Aurora -->
  <line x1="310" y1="284" x2="376" y2="284" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrv)"/>
  <!-- Profiler → webhook (up) -->
  <line x1="255" y1="258" x2="420" y2="222" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrb)"/>
  <!-- Aurora → SQS (post-approval) -->
  <line x1="480" y1="284" x2="556" y2="284" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arri)"/>
  <!-- SQS → Executor -->
  <line x1="650" y1="284" x2="716" y2="284" stroke="#d97706" stroke-width="1.5" marker-end="url(#arro)"/>
  <!-- Executor → S3 Processed -->
  <line x1="830" y1="284" x2="851" y2="284" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrg)"/>
  <!-- Executor → Aurora (profile write) -->
  <line x1="775" y1="310" x2="480" y2="310" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrv)"/>
  <!-- Executor → SNS/Drift -->
  <line x1="775" y1="310" x2="775" y2="322" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrt)"/>

  <!-- ═══════════════════════════════════════
       ROW 4 — AI (Claude)
  ════════════════════════════════════════ -->

  <!-- Claude suggest-transforms -->
  <rect x="200" y="468" width="260" height="48" rx="8" fill="#1a1631" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="330" y="487" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">Claude claude-sonnet-4-6</text>
  <text x="330" y="500" text-anchor="middle" fill="#a78bfa" font-size="8">suggest-transforms · chat-builder · vision (PDF/image)</text>

  <!-- Anthropic badge -->
  <rect x="550" y="468" width="100" height="48" rx="8" fill="#1a1631" stroke="#6d28d9" stroke-width="1.5"/>
  <text x="600" y="490" text-anchor="middle" fill="#ddd6fe" font-size="10" font-weight="600">Anthropic API</text>
  <text x="600" y="503" text-anchor="middle" fill="#a78bfa" font-size="8">ANTHROPIC_API_KEY</text>

  <!-- arrows AI -->
  <line x1="330" y1="468" x2="330" y2="320" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrp)"/>
  <line x1="460" y1="492" x2="546" y2="492" stroke="#6d28d9" stroke-width="1.5" marker-end="url(#arrp)"/>
  <!-- webhook triggers Claude route → aurora -->
  <line x1="430" y1="260" x2="330" y2="464" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrp)"/>

  <!-- ═══════════════════════════════════════
       ARROWHEAD DEFS
  ════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#4b5563"/>
    </marker>
    <marker id="arrb" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arro" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#d97706"/>
    </marker>
    <marker id="arrg" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrv" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arri" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#6366f1"/>
    </marker>
    <marker id="arrt" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0d9488"/>
    </marker>
    <marker id="arrp" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="532" width="880" height="20" rx="4" fill="#111827"/>
  <text x="50" y="546" fill="#374151" font-size="9">─── Sync</text>
  <text x="110" y="546" fill="#374151" font-size="9">- - - Async / background</text>
  <text x="250" y="546" fill="#3b82f6" font-size="9">■ Vercel/Next.js</text>
  <text x="340" y="546" fill="#d97706" font-size="9">■ Lambda</text>
  <text x="400" y="546" fill="#7c3aed" font-size="9">■ Aurora PG</text>
  <text x="470" y="546" fill="#16a34a" font-size="9">■ S3</text>
  <text x="500" y="546" fill="#6366f1" font-size="9">■ SQS</text>
  <text x="530" y="546" fill="#0d9488" font-size="9">■ SNS</text>
  <text x="565" y="546" fill="#8b5cf6" font-size="9">■ Claude AI</text>
</svg>
