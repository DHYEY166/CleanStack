<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0.5 L0,7.5 L7,4 z" fill="#374151"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto">
      <path d="M7,0.5 L7,7.5 L0,4 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1100" height="700" fill="#ffffff"/>
  <rect width="1100" height="700" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" fill="#0f172a" font-size="17" font-weight="700">CleanStack — Architecture Diagram</text>
  <text x="550" y="46" text-anchor="middle" fill="#64748b" font-size="10">How the application connects front end → back-end components</text>

  <!-- ══════════════════════════════════════════
       GROUP: VERCEL (dashed blue border)
  ══════════════════════════════════════════ -->
  <rect x="158" y="58" width="516" height="110" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="168" y="52" fill="#2563eb" font-size="9" font-weight="700" letter-spacing="0.8">VERCEL</text>

  <!-- ══════════════════════════════════════════
       GROUP: AWS (dashed orange border)
  ══════════════════════════════════════════ -->
  <rect x="18" y="202" width="918" height="368" rx="10" fill="#fffbf5" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="28" y="196" fill="#ea580c" font-size="9" font-weight="700" letter-spacing="0.8">AWS</text>

  <!-- ══════════════════════════════════════════
       ROW 1 — BROWSER / VERCEL / CLERK
  ══════════════════════════════════════════ -->

  <!-- Browser (Users) -->
  <rect x="22" y="68" width="128" height="90" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="86" y="94" text-anchor="middle" fill="#475569" font-size="10" font-weight="700">Browser</text>
  <text x="86" y="108" text-anchor="middle" fill="#64748b" font-size="8.5">Web client</text>
  <text x="86" y="120" text-anchor="middle" fill="#64748b" font-size="8.5">File upload · API calls</text>
  <text x="86" y="132" text-anchor="middle" fill="#64748b" font-size="8.5">Presigned S3 PUT</text>

  <!-- Arrow: Browser → Vercel Edge -->
  <line x1="150" y1="113" x2="168" y2="113" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Vercel Edge (CDN) -->
  <rect x="168" y="68" width="148" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="242" y="90" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="700">Vercel Edge Network</text>
  <text x="242" y="104" text-anchor="middle" fill="#1d4ed8" font-size="8.5">CDN / static assets</text>
  <text x="242" y="116" text-anchor="middle" fill="#1d4ed8" font-size="8.5">Global routing · TLS</text>
  <text x="242" y="128" text-anchor="middle" fill="#1d4ed8" font-size="8.5">DDoS protection</text>

  <!-- Arrow: Vercel Edge → Next.js -->
  <line x1="316" y1="113" x2="332" y2="113" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Next.js API Server -->
  <rect x="332" y="68" width="332" height="90" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="498" y="89" text-anchor="middle" fill="#3730a3" font-size="10.5" font-weight="700">Next.js 15 — Vercel Functions</text>
  <text x="378" y="103" fill="#4338ca" font-size="8">▸ /api/upload  /api/pipelines</text>
  <text x="378" y="115" fill="#4338ca" font-size="8">▸ /api/suggest-transforms  /api/approve-rules</text>
  <text x="378" y="127" fill="#4338ca" font-size="8">▸ /api/chat-builder (SSE)  /api/reconciler</text>
  <text x="378" y="139" fill="#4338ca" font-size="8">▸ /webhooks/profile-done  (maxDuration=120)</text>

  <!-- Clerk (Auth) -->
  <rect x="948" y="68" width="140" height="90" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="1018" y="90" text-anchor="middle" fill="#9d174d" font-size="10" font-weight="700">Clerk</text>
  <text x="1018" y="104" text-anchor="middle" fill="#be185d" font-size="8.5">Auth service</text>
  <text x="1018" y="116" text-anchor="middle" fill="#be185d" font-size="8.5">Sign-in · JWT tokens</text>
  <text x="1018" y="128" text-anchor="middle" fill="#be185d" font-size="8.5">Middleware guard</text>

  <!-- Arrow: Clerk ← Next.js (JWT) -->
  <line x1="948" y1="100" x2="668" y2="100" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="808" y="95" text-anchor="middle" fill="#64748b" font-size="8">JWT verify</text>

  <!-- ══════════════════════════════════════════
       ROW 2 — AWS CORE SERVICES
  ══════════════════════════════════════════ -->

  <!-- Arrows: Next.js → Row 2 AWS services -->
  <!-- Next.js → SQS -->
  <path d="M 430 158 L 430 186 L 90 186 L 90 212" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="260" y="183" text-anchor="middle" fill="#64748b" font-size="7.5">on approve</text>

  <!-- Next.js → Aurora -->
  <line x1="498" y1="158" x2="498" y2="212" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="510" y="190" fill="#64748b" font-size="7.5">read / write</text>

  <!-- Next.js → Bedrock -->
  <path d="M 570 158 L 570 186 L 730 186 L 730 212" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="660" y="183" text-anchor="middle" fill="#64748b" font-size="7.5">AI calls</text>

  <!-- SQS -->
  <rect x="28" y="212" width="130" height="88" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="93" y="234" text-anchor="middle" fill="#713f12" font-size="10" font-weight="700">Amazon SQS</text>
  <text x="93" y="248" text-anchor="middle" fill="#92400e" font-size="8.5">Message queue</text>
  <text x="93" y="260" text-anchor="middle" fill="#92400e" font-size="8.5">executor-queue</text>
  <text x="93" y="272" text-anchor="middle" fill="#92400e" font-size="8.5">At-least-once delivery</text>
  <text x="93" y="284" text-anchor="middle" fill="#92400e" font-size="8.5">Async job trigger</text>

  <!-- Upstash Redis (external service, between SQS and Aurora) -->
  <rect x="175" y="212" width="148" height="88" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="249" y="234" text-anchor="middle" fill="#064e3b" font-size="10" font-weight="700">Upstash Redis</text>
  <text x="249" y="248" text-anchor="middle" fill="#065f46" font-size="8.5">Cache layer</text>
  <text x="249" y="260" text-anchor="middle" fill="#065f46" font-size="8.5">Rate limiting (20/hr)</text>
  <text x="249" y="272" text-anchor="middle" fill="#065f46" font-size="8.5">Quota cache (60s TTL)</text>
  <text x="249" y="284" text-anchor="middle" fill="#065f46" font-size="8.5">Hot reads</text>

  <!-- Arrow: Next.js ↔ Upstash Redis (bidirectional) -->
  <line x1="380" y1="158" x2="300" y2="212" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="4,2"/>

  <!-- Aurora PG -->
  <rect x="340" y="212" width="165" height="88" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="422" y="234" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="700">Amazon Aurora PG</text>
  <text x="422" y="248" text-anchor="middle" fill="#5b21b6" font-size="8.5">Primary database</text>
  <text x="422" y="260" text-anchor="middle" fill="#5b21b6" font-size="8.5">RDS Data API (HTTP)</text>
  <text x="422" y="272" text-anchor="middle" fill="#5b21b6" font-size="8.5">pipelines · rules · runs</text>
  <text x="422" y="284" text-anchor="middle" fill="#5b21b6" font-size="8.5">profiles · subscriptions</text>

  <!-- Bedrock -->
  <rect x="523" y="212" width="160" height="88" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="603" y="234" text-anchor="middle" fill="#701a75" font-size="10" font-weight="700">Amazon Bedrock</text>
  <text x="603" y="248" text-anchor="middle" fill="#86198f" font-size="8.5">AI / LLM service</text>
  <text x="603" y="260" text-anchor="middle" fill="#86198f" font-size="8.5">Claude Sonnet 4.6</text>
  <text x="603" y="272" text-anchor="middle" fill="#86198f" font-size="8.5">Rule gen · committee</text>
  <text x="603" y="284" text-anchor="middle" fill="#86198f" font-size="8.5">Chat Builder (SSE)</text>

  <!-- SNS -->
  <rect x="701" y="212" width="130" height="88" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="766" y="234" text-anchor="middle" fill="#831843" font-size="10" font-weight="700">Amazon SNS</text>
  <text x="766" y="248" text-anchor="middle" fill="#9d174d" font-size="8.5">Notification service</text>
  <text x="766" y="260" text-anchor="middle" fill="#9d174d" font-size="8.5">drift-alerts topic</text>
  <text x="766" y="272" text-anchor="middle" fill="#9d174d" font-size="8.5">Fan-out delivery</text>
  <text x="766" y="284" text-anchor="middle" fill="#9d174d" font-size="8.5">→ Slack webhook</text>

  <!-- Slack (external) -->
  <rect x="950" y="212" width="132" height="88" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="1016" y="229" text-anchor="middle" fill="#374151" font-size="8" font-style="italic">external</text>
  <text x="1016" y="244" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">Slack</text>
  <text x="1016" y="258" text-anchor="middle" fill="#166534" font-size="8.5">Incoming webhook</text>
  <text x="1016" y="270" text-anchor="middle" fill="#166534" font-size="8.5">Schema drift alerts</text>
  <text x="1016" y="282" text-anchor="middle" fill="#166534" font-size="8.5">Real-time notify</text>

  <!-- Arrow: SNS → Slack -->
  <line x1="831" y1="256" x2="946" y2="256" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="888" y="250" text-anchor="middle" fill="#64748b" font-size="7.5">drift alert</text>

  <!-- ══════════════════════════════════════════
       ROW 3 — AWS LAMBDA WORKERS + S3
  ══════════════════════════════════════════ -->

  <!-- Arrow: SQS → Lambda Executor -->
  <line x1="93" y1="300" x2="93" y2="360" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="105" y="334" fill="#64748b" font-size="7.5">trigger</text>

  <!-- Arrow: S3 Raw → Lambda Profiler (trigger) -->
  <line x1="500" y1="300" x2="200" y2="360" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="4,2"/>
  <text x="350" y="336" text-anchor="middle" fill="#64748b" font-size="7.5">S3 PUT trigger</text>

  <!-- Lambda Profiler -->
  <rect x="28" y="360" width="156" height="92" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="106" y="381" text-anchor="middle" fill="#7f1d1d" font-size="9.5" font-weight="700">λ Profiler</text>
  <text x="106" y="395" text-anchor="middle" fill="#991b1b" font-size="8.5">Lambda worker (Python)</text>
  <text x="106" y="407" text-anchor="middle" fill="#991b1b" font-size="8.5">Analyzes 9 file formats</text>
  <text x="106" y="419" text-anchor="middle" fill="#991b1b" font-size="8.5">Quality score 0–100</text>
  <text x="106" y="431" text-anchor="middle" fill="#991b1b" font-size="8.5">→ webhook → Next.js</text>

  <!-- Lambda Executor -->
  <rect x="200" y="360" width="156" height="92" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="278" y="381" text-anchor="middle" fill="#7f1d1d" font-size="9.5" font-weight="700">λ Executor</text>
  <text x="278" y="395" text-anchor="middle" fill="#991b1b" font-size="8.5">Lambda worker (Python)</text>
  <text x="278" y="407" text-anchor="middle" fill="#991b1b" font-size="8.5">Applies transforms · pandas</text>
  <text x="278" y="419" text-anchor="middle" fill="#991b1b" font-size="8.5">20+ cleaning rule types</text>
  <text x="278" y="431" text-anchor="middle" fill="#991b1b" font-size="8.5">Auto-clean (≤3 passes)</text>

  <!-- Lambda Drift -->
  <rect x="372" y="360" width="148" height="92" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="446" y="381" text-anchor="middle" fill="#7f1d1d" font-size="9.5" font-weight="700">λ Drift Alert</text>
  <text x="446" y="395" text-anchor="middle" fill="#991b1b" font-size="8.5">Lambda worker (Python)</text>
  <text x="446" y="407" text-anchor="middle" fill="#991b1b" font-size="8.5">SNS-triggered</text>
  <text x="446" y="419" text-anchor="middle" fill="#991b1b" font-size="8.5">Schema hash compare</text>
  <text x="446" y="431" text-anchor="middle" fill="#991b1b" font-size="8.5">Fires Slack webhook</text>

  <!-- Arrow: SNS → Lambda Drift -->
  <path d="M 766 300 L 766 342 L 446 342 L 446 360" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="4,2"/>

  <!-- S3 Object Storage -->
  <rect x="537" y="360" width="400" height="92" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="737" y="381" text-anchor="middle" fill="#14532d" font-size="10" font-weight="700">Amazon S3 — Object Storage</text>
  <text x="600" y="395" fill="#166534" font-size="8.5">Raw bucket: cleanstack-raw-*</text>
  <text x="600" y="407" fill="#166534" font-size="8.5">Processed bucket: cleanstack-processed-*</text>
  <text x="600" y="419" fill="#166534" font-size="8.5">SSE-KMS encryption at rest</text>
  <text x="600" y="431" fill="#166534" font-size="8.5">Presigned PUT (upload) · Presigned GET (download)</text>
  <!-- Second column of S3 notes -->
  <text x="785" y="395" fill="#166534" font-size="8.5">Files · media · backups</text>
  <text x="785" y="407" fill="#166534" font-size="8.5">Lambda profiler reads raw</text>
  <text x="785" y="419" fill="#166534" font-size="8.5">Lambda executor writes clean</text>
  <text x="785" y="431" fill="#166534" font-size="8.5">→ browser downloads result</text>

  <!-- Arrow: Lambda Executor → S3 Processed (write) -->
  <line x1="356" y1="406" x2="533" y2="406" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="444" y="400" text-anchor="middle" fill="#64748b" font-size="7.5">writes clean file</text>

  <!-- Arrow: S3 → Lambda Profiler (bidirectional for reads too - just label) -->
  <line x1="540" y1="390" x2="188" y2="390" stroke="#374151" stroke-width="1.2" fill="none" marker-end="url(#a)" stroke-dasharray="3,2"/>
  <text x="364" y="385" text-anchor="middle" fill="#64748b" font-size="7.5">reads raw file</text>

  <!-- ══════════════════════════════════════════
       ROW 4 — OBSERVABILITY (full-width)
  ══════════════════════════════════════════ -->
  <rect x="18" y="480" width="1064" height="74" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="550" y="498" text-anchor="middle" fill="#475569" font-size="9" font-weight="700">OBSERVABILITY &amp; SECURITY — Logs, metrics, traces, encryption, audit across all services</text>

  <!-- Sentry -->
  <rect x="28" y="505" width="180" height="40" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="118" y="521" text-anchor="middle" fill="#4c1d95" font-size="9" font-weight="700">Sentry</text>
  <text x="118" y="535" text-anchor="middle" fill="#5b21b6" font-size="8">Error monitoring · @sentry/nextjs</text>

  <!-- EventBridge -->
  <rect x="220" y="505" width="200" height="40" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="320" y="521" text-anchor="middle" fill="#78350f" font-size="9" font-weight="700">Amazon EventBridge</text>
  <text x="320" y="535" text-anchor="middle" fill="#92400e" font-size="8">Cron every 5 min → reconciler (stuck run recovery)</text>

  <!-- CloudTrail -->
  <rect x="432" y="505" width="190" height="40" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1"/>
  <text x="527" y="521" text-anchor="middle" fill="#7c2d12" font-size="9" font-weight="700">AWS CloudTrail</text>
  <text x="527" y="535" text-anchor="middle" fill="#9a3412" font-size="8">Audit trail · all AWS API calls logged</text>

  <!-- KMS -->
  <rect x="634" y="505" width="170" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="719" y="521" text-anchor="middle" fill="#7f1d1d" font-size="9" font-weight="700">AWS KMS</text>
  <text x="719" y="535" text-anchor="middle" fill="#991b1b" font-size="8">S3 SSE-KMS · encryption at rest</text>

  <!-- IAM -->
  <rect x="816" y="505" width="256" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="944" y="521" text-anchor="middle" fill="#14532d" font-size="9" font-weight="700">IAM · MFA · Least Privilege</text>
  <text x="944" y="535" text-anchor="middle" fill="#166534" font-size="8">Role-based access · MFA enforcement · minimal permissions</text>

  <!-- ══════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════ -->
  <rect x="18" y="572" width="1064" height="36" rx="6" fill="#f1f5f9"/>
  <line x1="38" y1="590" x2="68" y2="590" stroke="#374151" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="78" y="594" fill="#475569" font-size="8.5">Synchronous call</text>
  <line x1="148" y1="590" x2="178" y2="590" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a)"/>
  <text x="188" y="594" fill="#475569" font-size="8.5">Async / event-driven</text>
  <rect x="310" y="582" width="10" height="10" rx="2" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="328" y="592" fill="#475569" font-size="8.5">AWS Lambda function</text>
  <rect x="428" y="582" width="10" height="10" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="446" y="592" fill="#475569" font-size="8.5">Aurora PostgreSQL</text>
  <rect x="546" y="582" width="10" height="10" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="564" y="592" fill="#475569" font-size="8.5">Amazon S3</text>
  <rect x="624" y="582" width="10" height="10" rx="2" fill="#fae8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="642" y="592" fill="#475569" font-size="8.5">Amazon Bedrock (Claude Sonnet 4.6)</text>
  <rect x="828" y="582" width="10" height="10" rx="2" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="846" y="592" fill="#475569" font-size="8.5">Next.js / Vercel Functions</text>
  <rect x="988" y="582" width="10" height="10" rx="2" fill="#f0fdf4" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,1"/>
  <text x="1006" y="592" fill="#475569" font-size="8.5">External</text>

  <!-- Footer -->
  <text x="550" y="626" text-anchor="middle" fill="#94a3b8" font-size="8.5">clean-stack-eta.vercel.app · github.com/DHYEY166/CleanStack · B2B Data Pipeline Automation · Row-based billing: Free 50K · Pro 1M · Team 10M rows/mo</text>
</svg>
